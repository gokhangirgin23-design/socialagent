# ===== Ortak ayarlar (tüm profiller) =====
spring:
  application:
    name: SocialAgent
  profiles:
    # Aksi belirtilmezse local profil
    default: local
  # Static dosyalar (HTML/JS/CSS) tarayıcı tarafından önbelleğe alınmasın (geliştirme kolaylığı)
  web:
    resources:
      cache:
        period: 0
        use-last-modified: false

server:
  port: 8080
  # Reverse proxy arkasında doğru host/scheme için (airepo)
  forward-headers-strategy: framework
  shutdown: graceful
  tomcat:
      threads:
        max: 50
        min-spare: 5
      accept-count: 100
      connection-timeout: 5000
  compression:
      enabled: true
      mime-types: application/json,text/markdown,text/plain

# Swagger UI yolu (kök URL buraya yönlenir)
springdoc:
  swagger-ui:
    path: /swagger-ui.html

# Actuator + Prometheus (airepo)
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

# ===== Uygulama bazlı ayarlar (FAZ 1: JWT + Google SSO) =====
app:
  jwt:
    # PROD/TEST'te JWT_SECRET env'i zorunlu; local için güvenli olmayan varsayılan
    secret: ${JWT_SECRET}
    # Access token ömrü (dakika)
    access-token-expiration-minutes: ${JWT_ACCESS_MINUTES:30}
    # Refresh token ömrü (gün)
    refresh-token-expiration-days: ${JWT_REFRESH_DAYS:30}
  google:
    # Beklenen audience = OAuth client id (prod/test'te env ile verilir)
    client-id: ${GOOGLE_CLIENT_ID}
    # Gerçek imza doğrulaması (local'de application-local.yml ile false yapılır)
    verification-enabled: ${GOOGLE_VERIFICATION_ENABLED:false}
  # ===== FAZ 4: RabbitMQ kuyruk adları (vhost profil bazlı yml'den) =====
  messaging:
    job-queue: ${JOB_QUEUE:socialagent.job.queue}
    job-exchange: ${JOB_EXCHANGE:socialagent.job.exchange}
    job-routing-key: ${JOB_ROUTING_KEY:socialagent.job}
  # ===== FAZ 5: Apify scraping ayarları (D1) =====
  apify:
    # Apify API token (prod/test'te env ile verilir; boşsa scraping atlanır)
    token: ${APIFY_TOKEN}
    base-url: ${APIFY_BASE_URL:https://api.apify.com/v2}
    # Aktör id'leri yolda "~" ile yazılır (apify~actor-name)
    profile-actor-id: ${APIFY_PROFILE_ACTOR:apify~instagram-search-scraper}
    post-actor-id: ${APIFY_POST_ACTOR:apify~instagram-post-scraper}
    # Sektör top-N (D1 -> 5) ve hesap başına son gönderi (-> 5)
    top-profiles-limit: ${APIFY_TOP_PROFILES:5}
    recent-posts-limit: ${APIFY_RECENT_POSTS:5}
    # run-sync okuma zaman aşımı (sn)
    timeout-seconds: ${APIFY_TIMEOUT_SECONDS:120}
  # ===== FAZ 5: Worker (RabbitMQ consumer) =====
  worker:
    enabled: ${WORKER_ENABLED:true}
  # ===== FAZ 6: AI analiz (LangChain4j) — TEXT->OpenAI, medya->Gemini (D3) =====
  ai:
    # AI analizini tümden açıp kapatma (local'de key zorunlu olmasın diye false yapılabilir)
    enabled: ${AI_ENABLED:true}
    openai:
      # OpenAI API anahtarı (prod/test env ile; boşsa TEXT analizi atlanır)
      api-key: ${OPENAI_API_KEY}
      model: ${OPENAI_MODEL:gpt-4o-mini}
      temperature: ${OPENAI_TEMPERATURE:0.2}
      timeout-seconds: ${OPENAI_TIMEOUT_SECONDS:60}
    gemini:
      # Gemini API anahtarı (prod/test env ile; boşsa medya analizi atlanır)
      api-key: ${GEMINI_API_KEY}
      model: ${GEMINI_MODEL:gemini-2.0-flash}
      temperature: ${GEMINI_TEMPERATURE:0.2}
      timeout-seconds: ${GEMINI_TIMEOUT_SECONDS:60}
  # ===== FAZ 8: Bildirim (mail + push) =====
  # Rapor tamamlanınca notification kaydı her zaman yazılır; mail/push kanalları aşağıdaki
  # bayraklarla açılır. SMTP verilmezse (spring.mail.host yok) mail otomatik atlanır.
  # ===== Admin endpoint güvenlik anahtarı =====
  # POST /admin/requeue-stuck gibi admin uçları için X-Admin-Key header'ında gönderilmeli.
  # Boş bırakılırsa admin uçları UNAUTHORIZED döner (güvenlik için prod'da mutlaka set et).
  admin:
    key: ${ADMIN_KEY:}
  notification:
    # E-posta kanalı (prod'da SMTP env'leri verilince MAIL_ENABLED=true yap)
    mail-enabled: ${MAIL_ENABLED:false}
    # Push kanalı (FCM stub; cihaz token altyapısı eklenince açılır)
    push-enabled: ${PUSH_ENABLED:false}
    # Giden e-posta "from" adresi (boşsa SMTP varsayılanı)
    from-address: ${MAIL_FROM:}
  # ===== FAZ PAYMENT: Rapor fiyatları (TL) =====
  report:
    price:
      none: 200
      own-only: 300
      competitor-only: 300
  # ===== FAZ PAYMENT: PayTR Direkt API =====
  # GİZLİ değerler (merchant-key/salt) env'den gelir; repo'ya/loga ASLA yazılmaz.
  paytr:
    merchant-id: ${PAYTR_MERCHANT_ID:}
    merchant-key: ${PAYTR_MERCHANT_KEY:}
    merchant-salt: ${PAYTR_MERCHANT_SALT:}
    post-url: https://www.paytr.com/odeme
    ok-url: ${PAYTR_OK_URL:https://trendora.app/payment/ok}
    fail-url: ${PAYTR_FAIL_URL:https://trendora.app/payment/fail}
    # PayTR Mağaza Paneli'ndeki Bildirim URL ile AYNI olmalı
    callback-url: ${PAYTR_CALLBACK_URL:https://api.trendora.app/payment/callback}
    test-mode: ${PAYTR_TEST_MODE:0}
    debug-on: ${PAYTR_DEBUG_ON:0}
    currency: TL
    client-lang: tr

