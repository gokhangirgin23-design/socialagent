version: '3.3'

services:

  app1:
    build: .
    env_file:
      - /opt/myapp/prod/.env
    restart: always
    ports:
      - "8081:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod

  app2:
    build: .
    env_file:
      - /opt/myapp/prod/.env
    restart: always
    ports:
      - "8082:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
