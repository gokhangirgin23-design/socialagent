name: Deploy TEST

on:
  push:
    branches:
      - develop

jobs:

  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}

          script: |
            cd /opt/socialagent/test/api/SocialAgent

            git fetch origin

            git reset --hard origin/develop

            chmod +x mvnw

            ./mvnw clean package -DskipTests

            docker-compose -p test -f docker-compose.test.yml down

            docker-compose -p test -f docker-compose.test.yml build --no-cache

            docker-compose -p test -f docker-compose.test.yml up -d
