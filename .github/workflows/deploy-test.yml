name: Deploy TEST

on:
push:
branches:
- develop

jobs:
deploy:
runs-on: ubuntu-latest

```
steps:
  - name: Deploy Test Server
    uses: appleboy/ssh-action@v1.0.3
    with:
      host: ${{ secrets.VPS_HOST }}
      username: ${{ secrets.VPS_USER }}
      key: ${{ secrets.VPS_SSH_KEY }}
      port: 22
      timeout: 30s
      command_timeout: 20m

      script: |
      
        cd /opt/socialagent/test/api/SocialAgent

        git fetch origin
        git reset --hard origin/develop

        ./mvnw clean package -DskipTests

        docker-compose -p test -f docker-compose.test.yml down || true

        docker-compose -p test -f docker-compose.test.yml up -d --build --force-recreate

        docker ps | grep socialagent-test-api

        sleep 15

        curl -f http://localhost:9181/actuator/health
```
