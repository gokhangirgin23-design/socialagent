name: Deploy PROD

on:
  push:
    branches:
      - main

jobs:

  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}

          script: |
            cd /opt/socialagent/prod/api/socialagent/SocialAgent

            git fetch origin

            git reset --hard origin/master

            chmod +x mvnw

            ./mvnw clean package -DskipTests

            docker-compose -p prod -f docker-compose.prod.yml down

            docker-compose -p prod -f docker-compose.prod.yml build --no-cache

            docker-compose -p prod -f docker-compose.prod.yml up -d
